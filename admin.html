<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin – To-Do List</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 2rem;
      background: #1a1a2e;
      color: #e8e8e8;
      min-height: 100vh;
    }
    .admin-wrap {
      max-width: 640px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.5rem;
      margin: 0 0 1.5rem;
      color: #fff;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 1rem;
      color: #7f8c8d;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link:hover { color: #4a90d9; }
    .form-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .form-row input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border: 1px solid #444;
      border-radius: 6px;
      background: #2d2d44;
      color: #fff;
      font-size: 0.95rem;
    }
    .form-row input::placeholder { color: #888; }
    .form-row input:focus {
      outline: none;
      border-color: #4a90d9;
    }
    .btn {
      padding: 0.6rem 1.2rem;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary {
      background: #4a90d9;
      color: white;
    }
    .btn-primary:hover { background: #3a7bc8; }
    .stats-card {
      background: #2d2d44;
      border-radius: 8px;
      padding: 1.25rem;
      margin-top: 1.5rem;
    }
    .stats-summary {
      font-size: 1.1rem;
      margin-bottom: 1rem;
      color: #bdc3c7;
    }
    .stats-summary strong { color: #fff; }
    .accounts-table {
      width: 100%;
      border-collapse: collapse;
    }
    .accounts-table th,
    .accounts-table td {
      padding: 0.6rem 0.8rem;
      text-align: left;
      border-bottom: 1px solid #3d3d5c;
    }
    .accounts-table th {
      color: #888;
      font-weight: 600;
      font-size: 0.8rem;
      text-transform: uppercase;
    }
    .accounts-table tr:last-child td { border-bottom: none; }
    .error-msg {
      color: #e74c3c;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    .empty-msg {
      color: #7f8c8d;
      font-style: italic;
      padding: 1rem 0;
    }
  </style>
</head>
<body>
  <div class="admin-wrap">
    <a href="/" class="back-link">← Back to To-Do List</a>
    <h1>Admin – Usage Stats</h1>
    <p style="color:#7f8c8d;font-size:0.9rem;margin:0 0 1rem;">View account count and usage. Requires an admin account.</p>
    <div class="form-row">
      <button class="btn btn-primary" id="loadBtn">Load stats</button>
    </div>
    <div id="error" class="error-msg" style="display:none"></div>
    <div id="statsCard" class="stats-card" style="display:none">
      <div class="stats-summary" id="statsSummary"></div>
      <table class="accounts-table" id="accountsTable">
        <thead>
          <tr>
            <th>Email</th>
            <th>Usage count</th>
          </tr>
        </thead>
        <tbody id="accountsBody"></tbody>
      </table>
    </div>
  </div>
  <script>
    document.getElementById('loadBtn').addEventListener('click', loadStats);
    if (localStorage.getItem('td_token')) loadStats();

    function getToken() {
      return localStorage.getItem('td_token');
    }

    async function loadStats() {
      const token = getToken();
      const errEl = document.getElementById('error');
      const cardEl = document.getElementById('statsCard');
      errEl.style.display = 'none';
      cardEl.style.display = 'none';

      if (!token) {
        errEl.innerHTML = 'Log in first. <a href="/" style="color:#4a90d9">Go to To-Do List</a>';
        errEl.style.display = 'block';
        return;
      }

      try {
        const r = await fetch('/api/admin/stats', {
          headers: { 'Authorization': 'Bearer ' + token }
        });
        if (r.status === 401) {
          errEl.innerHTML = 'Session expired. <a href="/" style="color:#4a90d9">Log in again</a>';
          errEl.style.display = 'block';
          return;
        }
        if (r.status === 403) {
          errEl.textContent = 'Admin access required. Set ADMIN_EMAIL in Render to match your account.';
          errEl.style.display = 'block';
          return;
        }
        if (r.status === 404) {
          errEl.textContent = 'Stats not available (Render/Postgres only).';
          errEl.style.display = 'block';
          return;
        }
        if (!r.ok) {
          errEl.textContent = 'Request failed: ' + r.status;
          errEl.style.display = 'block';
          return;
        }
        const data = await r.json();
        document.getElementById('statsSummary').textContent =
          'Total accounts: ' + (data.totalAccounts ?? 0);
        const tbody = document.getElementById('accountsBody');
        tbody.innerHTML = '';
        const accounts = data.accounts || [];
        if (accounts.length === 0) {
          tbody.innerHTML = '<tr><td colspan="2" class="empty-msg">No usage data yet.</td></tr>';
        } else {
          accounts.forEach(a => {
            const tr = document.createElement('tr');
            tr.innerHTML = '<td>' + escapeHtml(a.email || '') + '</td><td>' + (a.usageCount ?? 0) + '</td>';
            tbody.appendChild(tr);
          });
        }
        cardEl.style.display = 'block';
      } catch (e) {
        errEl.textContent = 'Error: ' + (e.message || 'Network error');
        errEl.style.display = 'block';
      }
    }

    function escapeHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }
  </script>
</body>
</html>
