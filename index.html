      const statusVal = document.getElementById('bulkStatus').value;
      let anyNewlyCompleted = false;
      let lastNewlyCompleted = null;
      selectedTaskIds.forEach(id => {
        const t = tasks.find(x => x.id === id);
        if (!t) return;
        if (taskVal) t.text = taskVal;
        if (courseVal !== '') t.courseId = courseVal;
        if (categoryVal !== '') t.category = categoryVal;
        if (dueVal) {
          t.dueDate = dueVal;
        }
        if (statusVal === 'open') {
          t.done = false;
          syncParentOnSubtaskReopen(t);
        } else if (statusVal === 'done') {
          if (!t.done) { anyNewlyCompleted = true; lastNewlyCompleted = t; }
          t.done = true;
          syncParentOnSubtaskComplete(t);
        }
      });
      if (anyNewlyCompleted) launchFireworks(lastNewlyCompleted);
      document.getElementById('bulkTask').value = '';
      document.getElementById('bulkCourse').value = '';
      document.getElementById('bulkCategory').value = '';
      document.getElementById('bulkDue').value = '';
      document.getElementById('bulkStatus').value = '';
      selectedTaskIds.clear();
      save();
      renderTasks();
    }

    function bulkClearSelection() {
      selectedTaskIds.clear();
      updateBulkBar();
      renderTasks();
    }

    function bulkSelectAllChange() {
      const checked = document.getElementById('bulkSelectAll').checked;
      document.querySelectorAll('.ov-row-select').forEach(cb => {
        const id = cb.dataset.id;
        if (checked) selectedTaskIds.add(id);
        else selectedTaskIds.delete(id);
        cb.checked = checked;
      });
      updateBulkBar();
    }

    /* ═══════════════════════════════════════════
       Remove with Undo (in-row)
    ═══════════════════════════════════════════ */
    function removeTaskWithUndo(t) {
      pendingRemovalTaskIds.add(t.id);
      renderTasks();
    }

    function undoRemoveInRow(taskId) {
      pendingRemovalTaskIds.delete(taskId);
      renderTasks();
    }

    function removeTaskAndSubtasks(taskId) {
      getSubtasks(taskId).forEach(sub => removeTaskAndSubtasks(sub.id));
      tasks = tasks.filter(x => x.id !== taskId);
    }
    function confirmRemoveInRow(taskId) {
      const task = tasks.find(x => x.id === taskId);
      const parentId = task?.parentId;
      removeTaskAndSubtasks(taskId);
      pendingRemovalTaskIds.delete(taskId);
      save();
      renderTasks();
    }

    /* ═══════════════════════════════════════════
       Import CSV
    ═══════════════════════════════════════════ */
    function parseCSV(text) {
      const rows = [];
      const lines = text.split(/\r?\n/).filter(l => l.trim());
      for (let i = 0; i < lines.length; i++) {
        const row = [];
        let cur = '';
        let inQuotes = false;
        for (let j = 0; j < lines[i].length; j++) {
          const c = lines[i][j];
          if (c === '"') { inQuotes = !inQuotes; continue; }
          if (!inQuotes && (c === ',' || c === '\t')) {
            row.push(cur.trim());
            cur = '';
            continue;
          }
          cur += c;
        }
        row.push(cur.trim());
        rows.push(row);
      }
      return rows;
    }

    function resolveCourseId(courseName) {
      if (!courseName || !courseName.trim()) return '';
      const name = courseName.trim();
      let c = courses.find(x => x.name.toLowerCase() === name.toLowerCase());
      if (!c) {
        c = { id: genId(), name, description: '' };
        courses.push(c);
        save();
      }
      return c.id;
    }

    function resolveTagName(tagName) {
      if (!tagName || !tagName.trim()) return '';
      const name = tagName.trim();
      let t = tags.find(x => x.name.toLowerCase() === name.toLowerCase());
      if (!t) {
        t = { id: genId(), name, color: COURSE_COLORS[tags.length % COURSE_COLORS.length] };
        tags.push(t);
        save();
      }
      return t.name;
    }

    function parseDate(str) {
      if (!str || !str.trim()) return '';
      const s = str.trim();
      const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})$/);
      if (m) return `${m[3]}-${m[1].padStart(2,'0')}-${m[2].padStart(2,'0')}`;
      const m2 = s.match(/^(\d{4})[\/\-](\d{1,2})[\/\-](\d{1,2})$/);
      if (m2) return `${m2[1]}-${m2[2].padStart(2,'0')}-${m2[3].padStart(2,'0')}`;
      return s;
    }

    function importFromCSV(file) {
      const reader = new FileReader();
      reader.onload = e => {
        const text = e.target.result;
        const rows = parseCSV(text);
        if (rows.length < 2) { alert('CSV must have a header row and at least one data row.'); return; }
        const header = rows[0].map(h => (h || '').toLowerCase().replace(/\s+/g, ''));
        const ci = header.findIndex(h => h === 'category' || h === 'course');
        const ti = header.findIndex(h => h === 'task');
        const tagi = header.findIndex(h => h === 'tag' || h === 'tags');
        const di = header.findIndex(h => h === 'duedate');
        const si = header.findIndex(h => h === 'status');
        if (ci < 0 || ti < 0 || tagi < 0 || di < 0 || si < 0) {
          alert('CSV must have header columns: Category, Task, Tag, Due Date, Status');
          return;
        }
        if (ci === tagi) {
          alert('CSV must have separate Category and Tag columns.');
          return;
        }
        const CATEGORY_COL = 0, TASK_COL = 1, TAG_COL = 2, DUE_COL = 3, STATUS_COL = 4;
        const useOrder = header.length >= 5 && header[0] === 'category' && header[1] === 'task' && header[2] === 'tag' && header[3] === 'duedate' && header[4] === 'status';
        const cCol = useOrder ? CATEGORY_COL : ci;
        const tCol = useOrder ? TASK_COL : ti;
        const tagCol = useOrder ? TAG_COL : tagi;
        const dCol = useOrder ? DUE_COL : di;
        const sCol = useOrder ? STATUS_COL : si;
        let added = 0;
        for (let i = 1; i < rows.length; i++) {
          const row = rows[i];
          const textVal = row[tCol] || '';
          if (!textVal.trim()) continue;
          const courseId = resolveCourseId(row[cCol] || '');
          const dueDate  = parseDate(row[dCol] || '');
          const statusVal = (row[sCol] || '').toLowerCase();
          const done = statusVal.includes('complete') || statusVal.includes('done') || statusVal === '1';
          const tagVal = (row[tagCol] || '').trim();
          const taskTag = tagVal ? resolveTagName(tagVal) : '';
          tasks.push({ id: genId(), text: textVal.trim(), dueDate, courseId, category: taskTag, done });
          added++;
        }
        save();
        renderCourses();
        renderTags();
        renderTasks();
        alert(`Imported ${added} task(s).`);
      };
      reader.readAsText(file);
    }

    /* ═══════════════════════════════════════════
       Column header sort click & resizable columns
    ═══════════════════════════════════════════ */
    const DEFAULT_COL_WIDTHS = { select: 40, text: 200, course: 140, category: 100, dueDate: 120, status: 100, actions: 96 };
    const RESIZABLE_COLS = ['text', 'course', 'category', 'dueDate', 'status'];
    const DEFAULT_COL_ORDER = ['text', 'course', 'category', 'dueDate', 'status'];

    function loadColOrder() {
      try {
        const raw = localStorage.getItem('td_col_order');
        if (raw) {
          const parsed = JSON.parse(raw);
          if (Array.isArray(parsed) && parsed.length === RESIZABLE_COLS.length &&
              RESIZABLE_COLS.every(c => parsed.includes(c))) return parsed;
        }
      } catch (_) {}
      return [...DEFAULT_COL_ORDER];
    }

    function saveColOrder(order) {
      localStorage.setItem('td_col_order', JSON.stringify(order));
    }

    function getColOrder() {
      const ths = document.querySelectorAll('.overview-table thead th[data-col]');
      return Array.from(ths).map(th => th.dataset.col);
    }

    function applyColOrder(order) {
      const colgroup = document.querySelector('.overview-table colgroup');
      const theadTr = document.querySelector('.overview-table thead tr');
      if (!colgroup || !theadTr) return;
      const selectCol = document.getElementById('col-select');
      const actionsCol = document.getElementById('col-actions');
      const dataCols = order.map(c => document.getElementById('col-' + c)).filter(Boolean);
      const selectTh = theadTr.querySelector('.ov-select-cell');
      const actionsTh = theadTr.querySelector('th:last-child');
      const dataThs = order.map(c => theadTr.querySelector(`th[data-col="${c}"]`)).filter(Boolean);
      colgroup.innerHTML = '';
      if (selectCol) colgroup.appendChild(selectCol);
      dataCols.forEach(c => colgroup.appendChild(c));
      if (actionsCol) colgroup.appendChild(actionsCol);
      while (theadTr.firstChild) theadTr.removeChild(theadTr.firstChild);
      if (selectTh) theadTr.appendChild(selectTh);
      dataThs.forEach(th => theadTr.appendChild(th));
      if (actionsTh) theadTr.appendChild(actionsTh);
    }

    function loadColWidths() {
      try {
        const raw = localStorage.getItem('td_col_widths');
        if (raw) {
          const parsed = JSON.parse(raw);
          return { ...DEFAULT_COL_WIDTHS, ...parsed };
        }
      } catch (_) {}
      return { ...DEFAULT_COL_WIDTHS };
    }

    function saveColWidths(widths) {
      localStorage.setItem('td_col_widths', JSON.stringify(widths));
    }

    function applyColWidths(widths) {
      RESIZABLE_COLS.concat(['select', 'actions']).forEach(col => {
        const colEl = document.getElementById('col-' + col);
        if (colEl && widths[col]) colEl.style.width = widths[col] + 'px';
      });
    }

    applyColWidths(loadColWidths());
    applyColOrder(loadColOrder());

    let justDraggedCol = false;
    document.querySelectorAll('.overview-table thead th[data-col]').forEach(th => {
      th.addEventListener('click', (e) => {
        if (e.target.classList.contains('col-resizer')) return;
        if (justDraggedCol) { justDraggedCol = false; return; }
        const col    = th.dataset.col;
        const ovSort = document.getElementById('ovSort');
        const ovDir  = document.getElementById('ovDir');
        if (ovSort.value === col) {
          ovDir.value = ovDir.value === 'asc' ? 'desc' : 'asc';
        } else {
          ovSort.value = col;
          ovDir.value  = 'asc';
        }
        renderOverview();
      });
    });

    document.querySelectorAll('.overview-table .col-resizer').forEach(resizer => {
      resizer.addEventListener('mousedown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const col = resizer.dataset.col;
        if (!RESIZABLE_COLS.includes(col)) return;
        const colEl = document.getElementById('col-' + col);
        const th = resizer.closest('th');
        if (!colEl || !th) return;
        th.classList.add('resizing');
        const startX = e.pageX;
        const startW = colEl.offsetWidth;
        const widths = loadColWidths();

        function onMove(e) {
          const dx = e.pageX - startX;
          let w = Math.max(60, Math.min(400, startW + dx));
          colEl.style.width = w + 'px';
          widths[col] = w;
        }
        function onUp() {
          th.classList.remove('resizing');
          saveColWidths(widths);
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
      });
    });

    let colDragSource = null;
    document.querySelectorAll('.overview-table thead th[data-col]').forEach(th => {
      th.addEventListener('dragstart', (e) => {
        colDragSource = th.dataset.col;
        e.dataTransfer.effectAllowed = 'move';
        e.dataTransfer.setData('text/plain', th.dataset.col);
        e.dataTransfer.setDragImage(th, 0, 0);
        th.style.opacity = '0.5';
      });
      th.addEventListener('dragend', (e) => {
        th.style.opacity = '';
        document.querySelectorAll('.overview-table thead th[data-col]').forEach(h => h.classList.remove('drag-over'));
        justDraggedCol = !!colDragSource;
        colDragSource = null;
      });
      th.addEventListener('dragover', (e) => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (colDragSource && colDragSource !== th.dataset.col) th.classList.add('drag-over');
      });
      th.addEventListener('dragleave', () => th.classList.remove('drag-over'));
      th.addEventListener('drop', (e) => {
        e.preventDefault();
        th.classList.remove('drag-over');
        const targetCol = th.dataset.col;
        if (!colDragSource || colDragSource === targetCol) return;
        const order = getColOrder();
        const fromIdx = order.indexOf(colDragSource);
        const toIdx = order.indexOf(targetCol);
        if (fromIdx < 0 || toIdx < 0) return;
        order.splice(fromIdx, 1);
        order.splice(toIdx, 0, colDragSource);
        saveColOrder(order);
        applyColOrder(order);
        renderOverview();
      });
    });

    /* ═══════════════════════════════════════════
       Pooh Bear celebration
    ═══════════════════════════════════════════ */
    const poohOverlay   = document.getElementById('poohOverlay');
    const poohContainer = document.getElementById('poohContainer');
    const poohFloaties  = document.getElementById('poohFloaties');
    let   poohTimer     = null;

    // Celebration GIFs — swap URLs if you have your own preferred GIFs
    const POOH_GIF     = 'https://i.giphy.com/9Y6n9TR7U07ew.gif';
    const RUMMY_GIF    = 'https://media.giphy.com/media/ZU0uJyigkDnNSYTbEa/giphy.gif';
    const DOG_GIF      = 'https://media.giphy.com/media/xjulTA8SOaEjjhSA81/giphy.gif';
    const DOG_ICON     = 'https://cdn.svgrepo.com/show/109812/bichon-frise.svg';
    const POOH_TEXT    = '🎉 Task Complete! 🎉';
    const POOH_SUB     = 'Pooh Bear says great job! 🎂🍯';
    const RUMMY_TEXT   = '🃏 Rummy Complete! 🃏';
    const RUMMY_SUB    = 'Nice hand! ♠️♥️♦️♣️';
    const DOG_TEXT     = '<img src="' + DOG_ICON + '" alt="shichon" class="pooh-dog-icon"> Walk Complete! <img src="' + DOG_ICON + '" alt="shichon" class="pooh-dog-icon">';
    const DOG_SUB      = 'Good dog! <img src="' + DOG_ICON + '" alt="shichon" class="pooh-dog-icon">';

    const FLOATIE_ICONS = ['🎉','🎈','🎂','🍯','🎊','⭐','🎈','🎉','🎂','🎊'];

    function getCompletionGif(task) {
      if (!task) return { gif: POOH_GIF, text: POOH_TEXT, sub: POOH_SUB };
      const text = (task.text || '').toLowerCase();
      const parent = task.parentId ? tasks.find(x => x.id === task.parentId) : null;
      const parentText = parent ? (parent.text || '').toLowerCase() : '';
      const combined = text + ' ' + parentText;
      if (/\b(rummy|playing cards?|card game|cards)\b/.test(combined)) return { gif: RUMMY_GIF, text: RUMMY_TEXT, sub: RUMMY_SUB };
      if (/\b(walk(ing)?\s+(a\s+)?(the\s+)?(dog|puppy)|walk\s+dog|walk\s+puppy|dog|puppy|shichon|schnauzer|schauzer|schison)\b/.test(combined)) return { gif: DOG_GIF, text: DOG_TEXT, sub: DOG_SUB };
      return { gif: POOH_GIF, text: POOH_TEXT, sub: POOH_SUB };
    }

    function spawnFloaties() {
      poohFloaties.innerHTML = '';
      const picks = [...FLOATIE_ICONS].sort(() => Math.random() - 0.5).slice(0, 9);
      picks.forEach((icon, i) => {
        const el = document.createElement('span');
        el.className = 'pooh-floatie';
        el.textContent = icon;
        el.style.left              = (4 + Math.random() * 92) + '%';
        el.style.bottom            = (-10 + Math.random() * 15) + '%';
        el.style.fontSize          = (1.3 + Math.random() * 1.6) + 'rem';
        el.style.animationDelay    = (i * 0.18 + Math.random() * 0.2) + 's';
        el.style.animationDuration = (2.4 + Math.random() * 1.4) + 's';
        poohFloaties.appendChild(el);
      });
    }

    function launchFireworks(task) {
      if (poohTimer) { clearTimeout(poohTimer); poohTimer = null; }
      const { gif, text, sub } = getCompletionGif(task);

      document.getElementById('poohGif').src             = gif;
      document.getElementById('poohText').innerHTML       = text;
      document.getElementById('poohSub').innerHTML       = sub;

      // Spawn floating icons
      spawnFloaties();

      // Reset bounce animation
      poohOverlay.classList.remove('pooh-visible', 'pooh-hiding');
      poohContainer.style.animation = 'none';
      void poohContainer.offsetWidth;
      poohContainer.style.animation = '';

      poohOverlay.classList.add('pooh-visible');
      poohOverlay.style.pointerEvents = 'auto';
      poohOverlay.onclick = dismissPooh;

      poohTimer = setTimeout(dismissPooh, 4000);
    }

    function dismissPooh() {
      if (poohTimer) { clearTimeout(poohTimer); poohTimer = null; }
      poohOverlay.onclick = null;
      poohOverlay.style.pointerEvents = 'none';
      poohOverlay.classList.remove('pooh-visible');
      poohOverlay.classList.add('pooh-hiding');
      setTimeout(() => poohOverlay.classList.remove('pooh-hiding'), 650);
    }

    /* ═══════════════════════════════════════════
       XSS helper
    ═══════════════════════════════════════════ */
    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    /* ═══════════════════════════════════════════
       Event wiring
    ═══════════════════════════════════════════ */
    document.getElementById('addCourseBtn').addEventListener('click', addCourse);
    document.getElementById('courseName').addEventListener('keydown', e => { if (e.key === 'Enter') addCourse(); });
    document.getElementById('courseDesc').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); addCourse(); }
    });

    document.getElementById('addTagBtn').addEventListener('click', addTag);
    document.getElementById('tagName').addEventListener('keydown', e => { if (e.key === 'Enter') addTag(); });

    document.getElementById('addTaskBtn').addEventListener('click', addTask);
    document.getElementById('newTask').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });


    document.getElementById('coursesToggle').addEventListener('click', toggleCourses);
    document.getElementById('tagsToggle').addEventListener('click', toggleTags);
    document.getElementById('toggleOverviewBtn').addEventListener('click', toggleOverview);
    document.getElementById('leftPanelToggle').addEventListener('click', toggleLeftPanel);

    document.getElementById('resetBtn').addEventListener('click', () => {
      if (!confirm('Clear all tasks? This cannot be undone.')) return;
      tasks = [];
      save();
      renderTasks();
    });

    document.getElementById('editModalCancel').addEventListener('click', closeEditModal);
    document.getElementById('editModalSave').addEventListener('click', saveEditModal);
    document.getElementById('editModalOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('editModalOverlay')) closeEditModal();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && document.getElementById('editModalOverlay').classList.contains('visible')) closeEditModal();
    });

    document.getElementById('importCsvBtn').addEventListener('click', () => document.getElementById('csvFileInput').click());
    document.getElementById('csvFileInput').addEventListener('change', e => {
      const f = e.target.files[0];
      if (f) { importFromCSV(f); e.target.value = ''; }
    });

    document.getElementById('ovSort').addEventListener('change', renderOverview);
    document.getElementById('ovDir').addEventListener('change', renderOverview);
    document.getElementById('ovFilterDate').addEventListener('change', () => {
      const sel = document.getElementById('ovFilterDate');
      const picker = document.getElementById('ovFilterDateSpecific');
      picker.style.display = sel.value === 'specific' ? '' : 'none';
      if (sel.value === 'specific' && !picker.value) picker.value = todayStr();
      renderOverview();
    });
    document.getElementById('ovFilterDateSpecific').addEventListener('change', renderOverview);
    document.getElementById('ovFilterStatus').addEventListener('change', renderOverview);
    document.getElementById('ovFilterCategory').addEventListener('change', renderOverview);
    document.getElementById('ovFilterCourse').addEventListener('change', renderOverview);
    document.getElementById('ovFilterSubtask').addEventListener('change', renderOverview);

    document.getElementById('bulkSelectAll').addEventListener('change', bulkSelectAllChange);
    document.getElementById('bulkApplyBtn').addEventListener('click', bulkApply);
    document.getElementById('bulkClearSelection').addEventListener('click', bulkClearSelection);

    /* ═══════════════════════════════════════════
       Init
    ═══════════════════════════════════════════ */
    document.getElementById('coursesBody').style.maxHeight = '0';
    document.getElementById('coursesToggle').classList.add('collapsed');
    document.getElementById('tagsBody').style.maxHeight = '0';
    document.getElementById('tagsToggle').classList.add('collapsed');

    async function doAuthInit() {
      const token = getToken();
      if (!token) { showAuthOverlay(); return; }
      try {
        const r = await apiFetch('/api/me');
        if (!r.ok) throw new Error();
        await loadDataFromApi();
        hideAuthOverlay();
        renderCourses();
        renderTags();
        renderTasks();
      } catch {
        showAuthOverlay();
      }
    }

    function onAuthSuccess() {
      hideAuthOverlay();
      renderCourses();
      renderTags();
      renderTasks();
    }

    if (USE_API) {
      async function parseAuthResponse(r) {
        const text = await r.text();
        try {
          return text ? JSON.parse(text) : {};
        } catch {
          if (r.status === 404) throw new Error('API not found. Run "npm run api" and open http://localhost:' + API_PORT);
          throw new Error('Server error. Make sure the API is running.');
        }
      }
      document.getElementById('authLoginBtn').addEventListener('click', async () => {
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        document.getElementById('authError').textContent = '';
        if (!email || !password) { document.getElementById('authError').textContent = 'Email and password required'; return; }
        try {
          const r = await fetch(API_BASE + '/api/auth/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
          const data = await parseAuthResponse(r);
          if (!r.ok) throw new Error(data.error || 'Login failed');
          setToken(data.token);
          await loadDataFromApi();
          onAuthSuccess();
        } catch (e) {
          document.getElementById('authError').textContent = e.message || 'Login failed';
        }
      });
      document.getElementById('authRegisterBtn').addEventListener('click', async () => {
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        document.getElementById('authError').textContent = '';
        if (!email || !password) { document.getElementById('authError').textContent = 'Email and password required'; return; }
        try {
          const r = await fetch(API_BASE + '/api/auth/register', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, password }) });
          const data = await parseAuthResponse(r);
          if (!r.ok) throw new Error(data.error || 'Registration failed');
          setToken(data.token);
          await loadDataFromApi();
          onAuthSuccess();
        } catch (e) {
          document.getElementById('authError').textContent = e.message || 'Registration failed';
        }
      });
      document.getElementById('logoutBtn').addEventListener('click', () => {
        clearToken();
        courses = [];
        tasks = [];
        tags = [];
        showAuthOverlay();
      });
      doAuthInit();
    } else {
      renderCourses();
      renderTags();
      renderTasks();
    }
  </script>
</body>
</html>
