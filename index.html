            addTr.className = 'ov-add-subtask-row subtask-row';
            const categoryHtml = '—';
            const tagHtml = '—';
            const dateHtml = task.dueDate ? `<span class="ov-date">${formatDate(task.dueDate)}</span>` : '—';
            const taskCellHtml = '<div class="ov-task-cell"><span class="ov-subtask-indicator" style="opacity:0.4">📝</span><input type="text" class="ov-subtask-input" placeholder="Type subtask and press Enter…" enterkeyhint="done"></div>';
            const actionsHtml = '<button class="ov-remove-btn" title="Cancel">✕</button>';
            const cellMap = { category: categoryHtml, tag: tagHtml, text: taskCellHtml, dueDate: dateHtml, status: '—', actions: actionsHtml };
            const addSelectTd = document.createElement('td');
            addSelectTd.className = 'ov-select-col';
            addTr.appendChild(addSelectTd);
            columnConfig.forEach(col => {
              const td = document.createElement('td');
              if (col.id === 'text') td.classList.add('ov-task-col');
              td.innerHTML = col.id === 'actions' ? actionsHtml : (cellMap[col.id] || '');
              addTr.appendChild(td);
            });
            const input = addTr.querySelector('.ov-subtask-input');
            const commit = () => {
              const text = (input.value || '').trim();
              if (text) {
                tasks.push({ id: genId(), text, dueDate: task.dueDate || '', courseId: task.courseId || '', category: task.category || '', done: false, parentId: parentId });
                save();
                renderTasks();
              } else addTr.remove();
            };
            const cancel = () => addTr.remove();
            input.addEventListener('keydown', e => {
              if (e.key === 'Enter') { e.preventDefault(); commit(); }
              else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
            });
            const addRowInsertedAt = Date.now();
            input.addEventListener('blur', () => {
              setTimeout(() => {
                if (addTr.isConnected && document.activeElement !== input && (Date.now() - addRowInsertedAt) > 50) commit();
              }, 30);
            });
            addTr.querySelector('.ov-remove-btn').addEventListener('click', (e) => { e.stopPropagation(); cancel(); });
            let insertAfter = tr;
            let sib = tr.nextElementSibling;
            while (sib && sib.classList.contains('subtask-row') && !sib.classList.contains('ov-add-subtask-row')) {
              insertAfter = sib;
              sib = sib.nextElementSibling;
            }
            insertAfter.insertAdjacentElement('afterend', addTr);
            requestAnimationFrame(() => {
              addTr.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
              input.focus();
            });
          });
        }

        tr.querySelector('.ov-remove-btn').addEventListener('click', () => {
          const parentIdToCheck = task.parentId || '';
          tasks = tasks.filter(x => x.id !== task.id && x.parentId !== task.id);
          if (parentIdToCheck && !tasks.some(x => (x.parentId || '') === parentIdToCheck)) {
            collapsedSubtasks.delete(parentIdToCheck);
            savePreferencesToStorage();
          }
          save();
          renderTasks();
        });

        const editBtn = tr.querySelector('.ov-edit-btn');
        if (editBtn) {
          editBtn.addEventListener('click', () => {
            if (task.parentId && collapsedSubtasks.has(task.parentId)) {
              pendingEditTaskId = task.id;
              collapsedSubtasks.delete(task.parentId);
              savePreferencesToStorage();
              renderTasks();
              return;
            }
            const openEdit = document.querySelector('tr.ov-edit-row');
            if (openEdit && openEdit !== tr) {
              const tid = openEdit.dataset.taskId;
              const t = tasks.find(x => x.id === tid);
              if (t) {
                const catSel = openEdit.querySelector('.ov-edit-cat-select');
                const tagSel = openEdit.querySelector('.ov-edit-tag-select');
                const textInp = openEdit.querySelector('.ov-edit-text-input');
                const dateInp = openEdit.querySelector('.ov-edit-date-input');
                const statusSel = openEdit.querySelector('.ov-edit-status-select');
                if (catSel) t.courseId = catSel.value || '';
                if (tagSel) t.category = tagSel.value || '';
                if (textInp) t.text = (textInp.value || '').trim() || t.text;
                if (dateInp) t.dueDate = dateInp.value || '';
                if (statusSel) {
                  const wasUnchecked = !t.done;
                  t.done = statusSel.value === 'done';
                  if (t.done && wasUnchecked) launchFireworks(t);
                  if (t.done && t.parentId) {
                    const parent = tasks.find(p => p.id === t.parentId);
                    const subtasks = tasks.filter(p => p.parentId === parent?.id);
                    if (parent && subtasks.length > 0 && subtasks.every(st => st.done)) {
                      parent.done = true;
                      launchFireworks(parent);
                    }
                  }
                  if (!t.done && t.parentId) {
                    const parent = tasks.find(p => p.id === t.parentId);
                    if (parent) parent.done = false;
                  }
                }
                save();
              }
              openEdit.classList.remove('ov-edit-row');
              renderTasks();
              return;
            }
            if (tr.classList.contains('ov-edit-row')) return;
            tr.classList.add('ov-edit-row');
            tr.dataset.taskId = task.id;
            const catSel = tr.querySelector('td[data-col="category"]');
            const tagSel = tr.querySelector('td[data-col="tag"]');
            const textTd = tr.querySelector('td[data-col="text"]');
            const dateTd = tr.querySelector('td[data-col="dueDate"]');
            const statusTd = tr.querySelector('td[data-col="status"]');
            const actionsTd = tr.querySelector('td[data-col="actions"]');
            if (catSel) {
              catSel.innerHTML = `<select class="ov-edit-select ov-edit-cat-select"><option value="">— No category —</option>${courses.map(c => `<option value="${escHtml(c.id)}" ${task.courseId === c.id ? 'selected' : ''}>${escHtml(c.name)}</option>`).join('')}</select>`;
            }
            if (tagSel) {
              tagSel.innerHTML = `<select class="ov-edit-select ov-edit-tag-select"><option value="">— No tag —</option>${tags.map(t => `<option value="${escHtml(t.name)}" ${task.category === t.name ? 'selected' : ''}>${escHtml(t.name)}</option>`).join('')}</select>`;
            }
            if (textTd) {
              const arrow = hasSubtasks ? `<span class="ov-subtask-toggle" style="opacity:0.5; cursor:default">${isExpanded ? '▼' : '▶'}</span>` : '';
              textTd.innerHTML = `<div class="ov-task-cell">${arrow}<input type="text" class="ov-edit-input ov-edit-text-input" value="${escHtml(task.text)}" style="flex:1; min-width:0"></div>`;
            }
            if (dateTd) {
              dateTd.innerHTML = `<input type="date" class="ov-edit-input ov-edit-date-input" value="${task.dueDate || ''}">`;
            }
            if (statusTd) {
              statusTd.innerHTML = `<select class="ov-edit-select ov-edit-status-select"><option value="open" ${!task.done ? 'selected' : ''}>● Open</option><option value="done" ${task.done ? 'selected' : ''}>✓ Complete</option></select>`;
            }
            const doSave = () => {
              const t = tasks.find(x => x.id === task.id);
              if (t) {
                const catSel = tr.querySelector('.ov-edit-cat-select');
                const tagSel = tr.querySelector('.ov-edit-tag-select');
                const inp = tr.querySelector('.ov-edit-text-input');
                const dateInp = tr.querySelector('.ov-edit-date-input');
                const statusSel = tr.querySelector('.ov-edit-status-select');
                if (catSel) t.courseId = catSel.value || '';
                if (tagSel) t.category = tagSel.value || '';
                if (inp) t.text = (inp.value || '').trim() || t.text;
                if (dateInp) t.dueDate = dateInp.value || '';
                if (statusSel) {
                  const wasUnchecked = !t.done;
                  t.done = statusSel.value === 'done';
                  if (t.done && wasUnchecked) launchFireworks(t);
                  if (t.done && t.parentId) {
                    const parent = tasks.find(p => p.id === t.parentId);
                    const subtasks = tasks.filter(p => p.parentId === parent?.id);
                    if (parent && subtasks.length > 0 && subtasks.every(st => st.done)) {
                      parent.done = true;
                      launchFireworks(parent);
                    }
                  }
                  if (!t.done && t.parentId) {
                    const parent = tasks.find(p => p.id === t.parentId);
                    if (parent) parent.done = false;
                  }
                }
                save();
              }
              tr.classList.remove('ov-edit-row');
              renderTasks();
            };
            if (actionsTd) {
              actionsTd.innerHTML = `<button class="ov-save-btn" title="Save">✓</button><button class="ov-cancel-btn" title="Cancel">Cancel</button>`;
              actionsTd.querySelector('.ov-save-btn').addEventListener('click', doSave);
              actionsTd.querySelector('.ov-cancel-btn').addEventListener('click', () => {
                tr.classList.remove('ov-edit-row');
                renderTasks();
              });
            }
            tr.querySelector('.ov-edit-text-input')?.focus();
            tr.querySelectorAll('.ov-edit-input, .ov-edit-select').forEach(el => {
              el.addEventListener('keydown', e => {
                if (e.key === 'Enter') { e.preventDefault(); doSave(); }
                if (e.key === 'Escape') { e.preventDefault(); tr.classList.remove('ov-edit-row'); renderTasks(); }
              });
            });
          });
        }


        tbody.appendChild(tr);

        const subtasks = hasSubtasks && isExpanded
          ? tasks.filter(t => t.parentId === task.id && matchesFilter(t))
          : [];
        subtasks.forEach(st => renderTaskRow(st, true));
      };

      sorted.forEach(t => renderTaskRow(t, false));

      if (pendingEditTaskId) {
        const pid = pendingEditTaskId;
        pendingEditTaskId = null;
        const row = tbody.querySelector(`tr[data-task-id="${pid}"]`);
        if (row) {
          const eb = row.querySelector('.ov-edit-btn');
          if (eb) eb.click();
        }
      }

      updateBulkBar();
      const selectAll = document.getElementById('ovSelectAll');
      if (selectAll) {
        selectAll.checked = visible.length > 0 && visible.every(t => selectedTaskIds.has(t.id));
        selectAll.onclick = null;
        selectAll.addEventListener('click', () => {
          const checked = selectAll.checked;
          visible.forEach(t => {
            if (checked) selectedTaskIds.add(t.id);
            else selectedTaskIds.delete(t.id);
          });
          tbody.querySelectorAll('.ov-task-checkbox').forEach(cb => { cb.checked = checked; });
          updateBulkBar();
        });
      }
    }

    function updateBulkBar() {
      const bar = document.getElementById('ovBulkBar');
      const countEl = document.getElementById('ovBulkCount');
      const undoBtn = document.getElementById('ovBulkUndo');
      if (!bar || !countEl) return;
      const n = selectedTaskIds.size;
      const hasUndo = !!bulkUndoSnapshot;
      bar.style.display = (n > 0 || hasUndo) ? 'flex' : 'none';
      countEl.textContent = n > 0 ? n + ' selected' : (hasUndo ? 'Undo last action' : '0 selected');
      if (undoBtn) undoBtn.style.display = hasUndo ? '' : 'none';
      if (n > 0) {
        const catMenu = document.getElementById('ovBulkCategoryMenu');
        const tagMenu = document.getElementById('ovBulkTagMenu');
        const statusMenu = document.getElementById('ovBulkStatusMenu');
        if (catMenu) {
          catMenu.innerHTML = '<div class="ov-bulk-dropdown-option" data-value=""><span style="color:#888">— No category —</span></div>' + courses.map(c => `<div class="ov-bulk-dropdown-option" data-value="${escHtml(c.id)}"><span class="badge" style="background:${categoryColor(c)}">${escHtml(c.name)}</span></div>`).join('');
        }
        if (tagMenu) {
          tagMenu.innerHTML = '<div class="ov-bulk-dropdown-option" data-value=""><span style="color:#888">— No tag —</span></div>' + tags.map(t => `<div class="ov-bulk-dropdown-option" data-value="${escHtml(t.name)}"><span class="badge" style="background:${t.color || '#4a90d9'}">${escHtml(t.name)}</span></div>`).join('');
        }
        if (statusMenu) {
          statusMenu.innerHTML = '<div class="ov-bulk-dropdown-option" data-value="open"><span class="status-pill open">● Open</span></div><div class="ov-bulk-dropdown-option" data-value="done"><span class="status-pill done">✓ Complete</span></div>';
        }
      }
    }

    /* ═══════════════════════════════════════════
       Toggle overview pane
    ═══════════════════════════════════════════ */
    function toggleOverview() {
      overviewVisible = !overviewVisible;
      const pane   = document.getElementById('rightPane');
      const wrapper = document.getElementById('appWrapper');
      const btn    = document.getElementById('toggleOverviewBtn');
      pane.classList.toggle('hidden', !overviewVisible);
      wrapper.classList.toggle('overview-hidden', !overviewVisible);
      btn.textContent = overviewVisible ? 'Hide Overview' : 'Show Overview';
      savePreferencesToStorage();
    }

    function toggleLeftPane() {
      leftPaneCollapsed = !leftPaneCollapsed;
      const wrapper = document.getElementById('appWrapper');
      const btn    = document.getElementById('leftPaneToggle');
      wrapper.classList.toggle('left-collapsed', leftPaneCollapsed);
      btn.textContent = leftPaneCollapsed ? '+' : '−';
      btn.title = leftPaneCollapsed ? 'Expand left pane' : 'Collapse left pane';
      savePreferencesToStorage();
    }

    /* ═══════════════════════════════════════════
       Collapsible panels
    ═══════════════════════════════════════════ */
    let categoriesOpen = true;
    let tagsOpen = true;
    let addTaskOpen = true;

    function toggleCategories() {
      categoriesOpen = !categoriesOpen;
      const body   = document.getElementById('categoriesBody');
      const toggle = document.getElementById('categoriesToggle');
      if (categoriesOpen) {
        body.style.maxHeight = body.scrollHeight + 'px';
        body.addEventListener('transitionend', () => {
          if (categoriesOpen) body.style.maxHeight = 'none';
        }, { once: true });
      } else {
        body.style.maxHeight = body.scrollHeight + 'px';
        requestAnimationFrame(() => { body.style.maxHeight = '0'; });
      }
      toggle.classList.toggle('collapsed', !categoriesOpen);
    }

    function toggleTags() {
      tagsOpen = !tagsOpen;
      const body   = document.getElementById('tagsBody');
      const toggle = document.getElementById('tagsToggle');
      if (tagsOpen) {
        body.style.maxHeight = body.scrollHeight + 'px';
        body.addEventListener('transitionend', () => {
          if (tagsOpen) body.style.maxHeight = 'none';
        }, { once: true });
      } else {
        body.style.maxHeight = body.scrollHeight + 'px';
        requestAnimationFrame(() => { body.style.maxHeight = '0'; });
      }
      toggle.classList.toggle('collapsed', !tagsOpen);
    }

    function toggleAddTask() {
      addTaskOpen = !addTaskOpen;
      const body   = document.getElementById('addTaskBody');
      const toggle = document.getElementById('addTaskToggle');
      if (addTaskOpen) {
        body.style.maxHeight = body.scrollHeight + 'px';
        body.addEventListener('transitionend', () => {
          if (addTaskOpen) body.style.maxHeight = 'none';
        }, { once: true });
      } else {
        body.style.maxHeight = body.scrollHeight + 'px';
        requestAnimationFrame(() => { body.style.maxHeight = '0'; });
      }
      toggle.classList.toggle('collapsed', !addTaskOpen);
    }

    /* ═══════════════════════════════════════════
       Column header: sort, drag, resize
    ═══════════════════════════════════════════ */
    document.getElementById('overviewTable').addEventListener('click', e => {
      const th = e.target.closest('thead th[data-col]');
      if (!th || e.target.closest('.col-resizer')) return;
      const col = th.dataset.col;
      const ovSort = document.getElementById('ovSort');
      const ovDir = document.getElementById('ovDir');
      if (ovSort.value === col) {
        ovDir.value = ovDir.value === 'asc' ? 'desc' : 'asc';
      } else {
        ovSort.value = col;
        ovDir.value = 'asc';
      }
      renderOverview();
    });

    document.getElementById('overviewTable').addEventListener('mousedown', e => {
      const resizer = e.target.closest('.col-resizer');
      if (resizer) {
        e.preventDefault();
        const idx = parseInt(resizer.dataset.colIdx, 10);
        const th = resizer.closest('th');
        let startX = e.pageX, startW = th.offsetWidth;
        const onMove = ev => {
          const dw = ev.pageX - startX;
          const newW = Math.max(columnConfig[idx].minWidth || 40, startW + dw);
          columnConfig[idx].width = newW;
          th.style.width = newW + 'px';
        };
        const onUp = () => {
          document.removeEventListener('mousemove', onMove);
          document.removeEventListener('mouseup', onUp);
          saveColumnConfig();
        };
        document.addEventListener('mousemove', onMove);

    document.getElementById('overviewTable').addEventListener('dragstart', e => {
      const th = e.target.closest('thead th[data-col]');
      if (!th || th.dataset.col === 'actions') return;
      draggedColIdx = columnConfig.findIndex(c => c.id === th.dataset.col);
      if (draggedColIdx >= 0) th.classList.add('dragging');
    });
    document.getElementById('overviewTable').addEventListener('dragend', e => {
      e.target.closest('thead th')?.classList.remove('dragging');
      document.querySelectorAll('thead th').forEach(h => h.classList.remove('drag-over'));
      draggedColIdx = null;
    });
    document.getElementById('overviewTable').addEventListener('dragover', e => {
      e.preventDefault();
      const th = e.target.closest('thead th[data-col]');
      if (!th || draggedColIdx == null) return;
      const idx = columnConfig.findIndex(c => c.id === th.dataset.col);
      if (idx >= 0 && idx !== draggedColIdx) {
        document.querySelectorAll('thead th').forEach(h => h.classList.remove('drag-over'));
        th.classList.add('drag-over');
      }
    });
    document.getElementById('overviewTable').addEventListener('drop', e => {
      e.preventDefault();
      const th = e.target.closest('thead th[data-col]');
      if (!th || draggedColIdx == null) return;
      const dropIdx = columnConfig.findIndex(c => c.id === th.dataset.col);
      if (dropIdx >= 0 && dropIdx !== draggedColIdx) {
        const [moved] = columnConfig.splice(draggedColIdx, 1);
        columnConfig.splice(dropIdx, 0, moved);
        saveColumnConfig();
        renderOverview();
      }

    const CARDS_GIF     = 'https://media.giphy.com/media/ZU0uJyigkDnNSYTbEa/giphy.gif';

      { url: POOH_GIF,   text: '🍯 Task Complete! 🍯', sub: 'Oh bother… you did it! ✨' }
    ];
    const PUPPY_CELEBRATION = { url: PUPPY_GIF, text: 'Puppy says Thank You!!', sub: '🐕' };

    const CELEBRATION_GIFS = [
      { url: POOH_GIF,   text: '🎉 Task Complete! 🎉', sub: 'Pooh Bear says great job! 🎂🍯' },
      { url: PUPPY_GIF,  text: '🎉 Task Complete! 🎉', sub: 'Good dog! You did it! 🐕✨' },

    function pickCelebrationGif(task) {
      const text = (task?.text || '').toLowerCase();
      const isDogWalk = /\b(exercise|walk|walking|dog|puppy|sadie)\b/.test(text);
      const isCards   = /\b(card|cards|playing cards|poker|bridge|solitaire|cribbage|euchre|hearts|spades|rummy)\b/.test(text);
      if (isDogWalk) return PUPPY_CELEBRATION;
      if (isCards)   return CARDS_CELEBRATION;
      return CELEBRATION_GIFS_CCJ[0];
    }

    const FLOATIE_ICONS = ['🎉','🎈','🎂','🍯','🎊','⭐','🎈','🎉','🎂','🎊'];

    function spawnFloaties() {
      poohFloaties.innerHTML = '';
      const picks = [...FLOATIE_ICONS].sort(() => Math.random() - 0.5).slice(0, 9);
      picks.forEach((icon, i) => {
        const el = document.createElement('span');
        el.className = 'pooh-floatie';
        el.textContent = icon;
        el.style.left              = (4 + Math.random() * 92) + '%';
        el.style.bottom            = (-10 + Math.random() * 15) + '%';
        el.style.fontSize          = (1.3 + Math.random() * 1.6) + 'rem';
        el.style.animationDelay    = (i * 0.18 + Math.random() * 0.2) + 's';
        el.style.animationDuration = (2.4 + Math.random() * 1.4) + 's';
        poohFloaties.appendChild(el);
      });

    function launchFireworks(task) {
      const canShow = USE_API && GIF_ENABLED_EMAIL && currentUser?.email &&

      const isCcj = currentUser?.email?.toLowerCase() === 'ccj2006@outlook.com';
      const pick = isCcj ? pickCelebrationGif(task) : CELEBRATION_GIFS[Math.floor(Math.random() * CELEBRATION_GIFS.length)];
      document.getElementById('poohGif').src             = pick.url;
      document.getElementById('poohText').textContent    = pick.text;

    document.getElementById('csvImportBtn').addEventListener('click', () => document.getElementById('csvImportInput').click());
    document.getElementById('csvImportInput').addEventListener('change', async (e) => {
      const file = e.target.files?.[0];
      e.target.value = '';
      if (!file) return;
      try {
        const text = await file.text();
        const lines = text.split(/\r?\n/).filter(l => l.trim());
        const courseMap = {};
        const importedTasks = [];
        const COL_KEYS = ['category', 'tag', 'task', 'duedate', 'status'];
        const norm = s => (s || '').toLowerCase().replace(/[\s_-]/g, '');
        let colMap = [0, 1, 2, 3, 4];
        if (lines.length > 0) {
          const firstRow = parseCSVLine(lines[0]);
          const firstNorm = firstRow.map(c => norm(c));
          const matches = COL_KEYS.filter(k => firstNorm.some(c => c === k || c.includes(k) || k.includes(c)));
          const isHeader = matches.length >= 2;
          if (isHeader) {
            colMap = COL_KEYS.map(k => {
              const idx = firstNorm.findIndex(c => c.includes(k) || k.includes(c));
              return idx >= 0 ? idx : -1;
            });
            lines.shift();
          }
        }
        for (let i = 0; i < lines.length; i++) {
          const row = parseCSVLine(lines[i]);
          const getCol = idx => (idx >= 0 && idx < row.length ? row[idx] : '') || '';
          const categoryName = getCol(colMap[0]);
          const tagName = getCol(colMap[1]);
          const taskText = getCol(colMap[2]);
          const dueDate = getCol(colMap[3]);
          const status = getCol(colMap[4]);
          if (!(taskText || '').trim()) continue;
          let courseId = '';
          if (categoryName && categoryName.trim()) {
            const cname = categoryName.trim();
            const ckey = cname.toLowerCase();
            if (!courseMap[ckey]) {
              const existing = courses.find(c => c.name.toLowerCase() === ckey);
              courseMap[ckey] = existing ? existing.id : (() => { const id = genId(); courses.push({ id, name: cname, description: '', color: DEFAULT_CATEGORY_COLOR }); return id; })();
            }
            courseId = courseMap[ckey];
          }
          const tagRaw = (tagName || '').trim();
          let tag = tagRaw;
          if (tagRaw) {
            const existingTag = tags.find(t => t.name.toLowerCase() === tagRaw.toLowerCase());
            if (existingTag) tag = existingTag.name;
            else { tags.push({ id: genId(), name: tagRaw, color: '#4a90d9' }); }
          }
          const done = /^(1|true|yes|done|complete|x|✓)$/i.test(String(status || '').trim());
          importedTasks.push({
            id: String(genId()),
            text: taskText.trim(),
            dueDate: normalizeImportDate(dueDate),
            courseId: String(courseId || ''),
            category: String(tag || ''),
            done: !!done,
            parentId: ''
          });
        }
        tasks = tasks.concat(importedTasks);
        if (USE_API && getToken()) {
          const r = await apiFetch('/api/sync', {
            method: 'POST',
            body: JSON.stringify({
              courses,
              tags,
              tasks: tasks.map(t => ({
                id: t.id, text: t.text, dueDate: t.dueDate || '', courseId: t.courseId || '',
                category: t.category || '', done: !!t.done, parentId: t.parentId || ''
              })),
              merge: true
            })
          });
          if (!r.ok) throw new Error('Sync failed');
          await loadDataFromApi();
        } else if (USE_API && !getToken()) {
          localStorage.setItem('td_courses', JSON.stringify(courses));
          localStorage.setItem('td_tasks', JSON.stringify(tasks));
          localStorage.setItem('td_tags', JSON.stringify(tags));
        } else {
          save();
        }
        renderCategories();
        renderTags();
        renderTasks();
        alert(`Imported ${importedTasks.length} task(s).`);
      } catch (err) {
        alert('Import failed: ' + (err.message || 'Unknown error'));
      }
    });
    function normalizeImportDate(val) {
      const s = (val || '').trim();
      if (!s) return '';
      if (/^\d{4}-\d{1,2}-\d{1,2}$/.test(s)) {
        const [y, m, d] = s.split('-').map(n => parseInt(n, 10));
        if (m >= 1 && m <= 12 && d >= 1 && d <= 31) {
          return `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        }
      }
      const d = new Date(s);
      if (isNaN(d.getTime())) return '';
      const y = d.getFullYear(), mo = d.getMonth() + 1, day = d.getDate();
      return `${y}-${String(mo).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    }
    function parseCSVLine(line) {
      const out = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') {
          inQ = !inQ;
        } else if ((c === ',' && !inQ) || c === '\t') {
          out.push(cur);
          cur = '';
        } else {
          cur += c;
        }
      }
      out.push(cur);
      return out.map(s => s.replace(/^"|"$/g, '').trim());
    }

    function applyBulkAction(updater, snapshotType) {
      const ids = Array.from(selectedTaskIds).filter(id => {
        const t = tasks.find(x => x.id === id);
        return t && !t.parentId;
      });
      if (ids.length === 0) return;
      if (snapshotType === 'modify') {
        bulkUndoSnapshot = { type: 'modify', tasks: ids.map(id => JSON.parse(JSON.stringify(tasks.find(x => x.id === id)))) };
      } else if (snapshotType === 'delete') {
        const toDelete = ids.flatMap(id => {
          const t = tasks.find(x => x.id === id);
          if (!t) return [];
          const subs = tasks.filter(x => x.parentId === id);
          return [t, ...subs].map(x => JSON.parse(JSON.stringify(x)));
        });
        bulkUndoSnapshot = { type: 'delete', tasks: toDelete };
      }
      ids.forEach(id => {
        const t = tasks.find(x => x.id === id);
        if (t) updater(t);
      });
      save();
      renderCategories();
      renderTags();
      renderTasks();
    }

    function closeAllBulkDropdowns() {
      document.querySelectorAll('.ov-bulk-dropdown.open').forEach(d => d.classList.remove('open'));

    function setupBulkDropdown(btnId, menuId, onSelect) {
      const btn = document.getElementById(btnId);
      const menu = document.getElementById(menuId);
      if (!btn || !menu) return;
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        document.querySelectorAll('.ov-bulk-dropdown.open').forEach(d => { if (d !== menu) d.classList.remove('open'); });
        menu.classList.toggle('open');
      });
      menu.addEventListener('click', (e) => {
        const opt = e.target.closest('.ov-bulk-dropdown-option');
        if (!opt) return;
        const v = opt.dataset.value;
        if (v) onSelect(v);
        menu.classList.remove('open');
      });
    }

      const toDelete = ids.flatMap(id => {
        const t = tasks.find(x => x.id === id);
        if (!t) return [];
        const subs = tasks.filter(x => x.parentId === id);
        return [t, ...subs].map(x => JSON.parse(JSON.stringify(x)));

      bulkUndoSnapshot = { type: 'delete', tasks: toDelete };

      renderCategories();
      renderTags();
      renderTasks();
    });
